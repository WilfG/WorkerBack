name: Laravel CI/CD FRP Backend

#Trigger 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Tests
  # ─────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Installer les dependances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparer l'environnement de test
        run: |
          cp .env.example .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=laravel_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing

      - name: Generer la cle  app
        run: php artisan key:generate --env=testing

      - name: Lancer les migrations de test
        run: php artisan migrate --env=testing --force
      - name: Lancer les seeders
        run: php artisan db:seed --env=testing --force
      - name: Lancer les tests
        run: php artisan test --env=testing

  # ─────────────────────────────────────────
  # JOB 2 : Déploiement
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/frp

            echo "→ Pull du code..."
            git pull origin main

            echo "→ Installation des dépendances..."
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            composer require fakerphp/faker

            echo "→ Migrations..."
            php artisan migrate --force
            php artisan db:seed --force

            echo "→ Permissions..."
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "→ Optimisation..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "→ Redémarrage d'Apache..."
            sudo systemctl reload apache2

            echo "✅ Deploiement terminee"
